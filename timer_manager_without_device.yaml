blueprint:
  name: "Timer Action Manager (Fixed)"
  description: "Reagiert präzise auf Timer-Events ohne Geister-Trigger."
  domain: automation
  input:
    target_timer:
      name: Timer Entität
      selector:
        entity:
          domain: timer
    timer_start_actions:
      name: "Aktionen bei Start"
      default: []
      selector:
        action: {}
    timer_end_actions:
      name: "Aktionen bei Ende"
      default: []
      selector:
        action: {}

mode: parallel

trigger:
  # Reagiert nur, wenn der Timer wirklich GESTARTET wird
  - platform: event
    event_type: timer.started
    event_data:
      entity_id: !input target_timer
    id: "t_start"

  # Reagiert nur, wenn der Timer von selbst ABLÄUFT
  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: !input target_timer
    id: "t_end"

  # Reagiert nur, wenn der Timer manuell GESTOPPT wird
  - platform: event
    event_type: timer.cancelled
    event_data:
      entity_id: !input target_timer
    id: "t_end"

action:
  - choose:
      - conditions:
          - condition: trigger
            id: "t_start"
        sequence: !input timer_start_actions

      - conditions:
          - condition: trigger
            id: "t_end"
        sequence: !input timer_end_actions